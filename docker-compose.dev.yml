# Development environment override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Or:    ./scripts/dev.sh

services:
  # Vite dev server with HMR
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --unsafe-perm && npm run dev --workspace @platform/frontend"
    volumes:
      - .:/app
      - dev-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    networks:
      - edge-net

  # Backend with dev settings (uses standard Dockerfile, rebuild on code changes)
  # After editing backend code: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build backend
  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Platform: "Host=postgres;Port=5432;Database=platform_dev;Username=platform_dev;Password=platform_dev"
      EmailVerification__Enabled: "false"
    ports:
      - "8080:8080"

  # Nginx disabled in dev — Vite handles frontend + API proxying
  # To enable: docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile with-nginx up
  nginx:
    profiles:
      - with-nginx
    volumes:
      - ./platform/infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

  # Dev database (isolated from production)
  postgres:
    environment:
      POSTGRES_DB: platform_dev
      POSTGRES_USER: platform_dev
      POSTGRES_PASSWORD: platform_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

volumes:
  dev-node-modules:
  postgres-dev-data:
