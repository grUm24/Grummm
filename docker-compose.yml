services:
  nginx:
    build:
      context: .
      dockerfile: platform/infra/nginx/Dockerfile
    container_name: platform-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-certs:/etc/nginx/certs
      - certbot-www:/var/www/certbot
      - ./platform/infra/nginx/static:/usr/share/nginx/html:ro
      - projects-storage:/var/projects
    networks:
      - edge-net

  backend:
    build:
      context: .
      dockerfile: platform/backend/Dockerfile
      args:
        ENABLE_RUNTIME_TEMPLATES: "false"
    container_name: platform-backend
    volumes:
      - projects-storage:/var/projects
      - ./backups/postgres:/var/backups/platform/postgres
    networks:
      - edge-net
      - data-net

  postgres:
    build:
      context: .
      dockerfile: platform/infra/postgres/Dockerfile
    container_name: platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data-net

networks:
  edge-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  postgres-data:
  nginx-certs:
  certbot-www:
  projects-storage:
