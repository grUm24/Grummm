name: Platform CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: platform-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  ci:
    name: CI - Build Backend and Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build backend
        run: dotnet build platform/backend/src/WebAPI/WebAPI.csproj --configuration Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check text encoding and mojibake
        run: npm run check:encoding

      - name: Build frontend
        env:
          PRERENDER_SEO_API_URL: ${{ vars.PRERENDER_SEO_API_URL }}
        run: npm run build --workspace @platform/frontend

  docker:
    name: CD - Build and Push Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      deploy_env: ${{ steps.vars.outputs.deploy_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags and environment
        id: vars
        shell: bash
        run: |
          echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "deploy_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static bundle for nginx image
        env:
          PRERENDER_SEO_API_URL: ${{ vars.PRERENDER_SEO_API_URL }}
        run: npm run build --workspace @platform/frontend

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-backend:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-backend:${{ steps.vars.outputs.deploy_env }}

      - name: Build and push frontend image (nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/infra/nginx/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-frontend:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-frontend:${{ steps.vars.outputs.deploy_env }}

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/infra/postgres/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-postgres:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/platform-postgres:${{ steps.vars.outputs.deploy_env }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.deploy.yml"
          target: ${{ vars.STAGING_DEPLOY_PATH || '/opt' }}
          overwrite: true

      - name: Deploy via SSH (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            DEPLOY_PATH="${{ vars.STAGING_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt"; fi
            cd "$DEPLOY_PATH"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export BACKEND_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-backend:${{ needs.docker.outputs.image_tag }}"
            export NGINX_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-frontend:${{ needs.docker.outputs.image_tag }}"
            export POSTGRES_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-postgres:${{ needs.docker.outputs.image_tag }}"
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --force-recreate --remove-orphans
            docker system prune -af

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.deploy.yml"
          target: ${{ vars.PRODUCTION_DEPLOY_PATH || '/opt' }}
          overwrite: true

      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            DEPLOY_PATH="${{ vars.PRODUCTION_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt"; fi
            cd "$DEPLOY_PATH"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export BACKEND_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-backend:${{ needs.docker.outputs.image_tag }}"
            export NGINX_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-frontend:${{ needs.docker.outputs.image_tag }}"
            export POSTGRES_IMAGE="ghcr.io/${{ needs.docker.outputs.image_namespace }}/platform-postgres:${{ needs.docker.outputs.image_tag }}"
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --force-recreate --remove-orphans
            docker system prune -af

  smoke-staging:
    name: Smoke Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    continue-on-error: true
    steps:
      - name: Wait for containers to stabilize
        run: sleep 20
      - name: Run smoke checks
        run: |
          BASE_URL="${{ vars.STAGING_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then BASE_URL="https://grummm.ru"; fi
          bash <(cat <<'SMOKE'
            set -euo pipefail
            PASS=0; FAIL=0
            ok()   { PASS=$((PASS+1)); echo "[OK] $1"; }
            fail() { FAIL=$((FAIL+1)); echo "[FAIL] $1"; }
            curl -ksS "$BASE_URL/health" | grep -q '"status":"healthy"' && ok "/health healthy" || fail "/health"
            curl -ksS "$BASE_URL/ready"  | grep -q '"status":"ready"'   && ok "/ready ready"   || fail "/ready"
            for path in / /posts /projects /login; do
              code=$(curl -ksS -o /dev/null -w "%{http_code}" "$BASE_URL$path")
              [ "$code" = "200" ] && ok "$path → 200" || fail "$path → $code"
            done
            csrf=$(curl -ksS -o /dev/null -w "%{http_code}" "$BASE_URL/api/public/security/csrf")
            { [ "$csrf" = "200" ] || [ "$csrf" = "204" ]; } && ok "CSRF endpoint" || fail "CSRF → $csrf"
            echo "Smoke summary: PASS=$PASS FAIL=$FAIL"
            [ "$FAIL" -eq 0 ]
          SMOKE) BASE_URL="$BASE_URL"

  smoke-production:
    name: Smoke Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Wait for containers to stabilize
        run: sleep 20
      - name: Run smoke checks
        run: |
          BASE_URL="${{ vars.PRODUCTION_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then BASE_URL="https://grummm.ru"; fi
          PASS=0; FAIL=0
          ok()   { PASS=$((PASS+1)); echo "[OK] $1"; }
          fail() { FAIL=$((FAIL+1)); echo "[FAIL] $1"; }
          curl -ksS "$BASE_URL/health" | grep -q '"status":"healthy"' && ok "/health healthy" || fail "/health"
          curl -ksS "$BASE_URL/ready"  | grep -q '"status":"ready"'   && ok "/ready ready"   || fail "/ready"
          for path in / /posts /projects /login; do
            code=$(curl -ksS -o /dev/null -w "%{http_code}" "$BASE_URL$path")
            [ "$code" = "200" ] && ok "$path → 200" || fail "$path → $code"
          done
          csrf=$(curl -ksS -o /dev/null -w "%{http_code}" "$BASE_URL/api/public/security/csrf")
          { [ "$csrf" = "200" ] || [ "$csrf" = "204" ]; } && ok "CSRF endpoint" || fail "CSRF → $csrf"
          echo "Smoke summary: PASS=$PASS FAIL=$FAIL"
          [ "$FAIL" -eq 0 ]

