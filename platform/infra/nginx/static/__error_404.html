<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>404 | Grummm</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-border: rgba(129, 166, 198, 0.22);
        --text: #18232f;
        --text-muted: #617080;
        --accent: #81a6c6;
        --radius-lg: 28px;
        --radius-pill: 999px;
        --shadow: 0 20px 60px rgba(18, 24, 34, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        background:
          radial-gradient(circle at 12% 18%, rgba(129, 166, 198, 0.12), transparent 24%),
          radial-gradient(circle at 82% 78%, rgba(170, 205, 220, 0.12), transparent 22%),
          var(--bg);
        color: var(--text);
        font-family: "Aptos", "Segoe UI Variable Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      main { width: min(52rem, 100%); }

      .card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 2rem;
        padding: clamp(1.25rem, 4vw, 2.5rem);
        border: 1px solid var(--surface-border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 0.9rem;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 0.94;
        letter-spacing: -0.06em;
      }

      p {
        margin: 1rem 0 0;
        max-width: 36rem;
        color: var(--text-muted);
        font-size: 1.02rem;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.4rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0 1.15rem;
        border-radius: var(--radius-pill);
        border: 1px solid var(--surface-border);
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
        background: linear-gradient(135deg, rgba(129, 166, 198, 0.18), rgba(170, 205, 220, 0.12));
      }

      a.secondary {
        background: rgba(255, 255, 255, 0.72);
      }

      .art {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .art img {
        width: 100%;
        max-width: 320px;
        height: auto;
        border-radius: 18px;
        object-fit: contain;
        filter: drop-shadow(0 12px 40px rgba(18, 24, 34, 0.10));
      }

      @media (max-width: 699.98px) {
        body { padding: 0.8rem; }

        .card {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .art { order: -1; }

        .art img { max-width: 200px; }

        .actions {
          display: grid;
          grid-template-columns: minmax(0, 1fr);
        }

        a { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="page-title">
        <div class="copy">
          <p class="eyebrow">Ошибка 404</p>
          <h1 id="page-title">Страница не найдена</h1>
          <p>Неверный адрес или страница больше не существует.</p>
          <div class="actions">
            <a href="/">На главную</a>
            <a class="secondary" href="/projects">Открыть проекты</a>
          </div>
        </div>
        <div class="art">
          <img src="/404-cat.png" alt="404 — страница не найдена" width="320" height="320" loading="eager" />
        </div>
      </section>
    </main>
  </body>
</html>
